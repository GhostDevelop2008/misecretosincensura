<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Firestore Explorer — misecretofreesecretos</title>
    <style>
        body {
            font-family: monospace;
            padding: 24px;
            background: #fff;
            color: #111;
        }

        h2 {
            margin-bottom: 4px;
        }

        p {
            margin: 4px 0;
        }

        button {
            padding: 6px 14px;
            cursor: pointer;
            margin-right: 6px;
        }

        input,
        textarea {
            padding: 5px 8px;
        }

        hr {
            margin: 16px 0;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            padding: 4px 0;
        }

        li a {
            cursor: pointer;
            color: blue;
            text-decoration: underline;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 6px 10px;
            text-align: left;
            font-size: 13px;
            vertical-align: top;
        }

        th {
            background: #f0f0f0;
        }

        .error {
            color: red;
        }

        .muted {
            color: #888;
            font-size: 13px;
        }

        .pagination {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-danger {
            background: #fff0f0;
            color: red;
            border: 1px solid red;
        }

        .btn-edit {
            background: #f0f8ff;
            color: blue;
            border: 1px solid blue;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 10;
            justify-content: center;
            align-items: center;
        }

        .overlay.show {
            display: flex;
        }

        .modal {
            background: #fff;
            padding: 24px;
            width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #ccc;
        }

        .modal h3 {
            margin: 0 0 12px;
        }

        .modal label {
            display: block;
            font-size: 12px;
            color: #555;
            margin-top: 10px;
        }

        .modal input,
        .modal textarea {
            width: 100%;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 13px;
            margin-top: 2px;
        }

        .modal textarea {
            height: 80px;
        }

        .modal-footer {
            margin-top: 16px;
            display: flex;
            gap: 8px;
        }

        .add-field-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .add-field-row input {
            flex: 1;
        }
    </style>
</head>

<body>

    <h2>Explorer — misecretofreesecretos</h2>
    <p class="muted">Firestore + Realtime Database</p>

    <br>
    <b>Firestore</b><br><br>
    <button onclick="loadFirestore()">Cargar colecciones Firestore</button>

    <br><br>
    <label>Colección manual: <input type="text" id="manualCol" placeholder="nombre..." /></label>
    <button onclick="addManual()">Cargar</button>

    <p id="errorBox" class="error" style="display:none;"></p>

    <hr>

    <div style="display:flex; gap:40px; align-items:flex-start;">
        <div style="min-width:180px;">
            <b>Colecciones (<span id="colCount">0</span>):</b>
            <ul id="colList" style="margin-top:8px;">
                <li class="muted">ninguna</li>
            </ul>
        </div>
        <div style="flex:1;">
            <b id="docsTitle">Documentos</b>
            <span id="addDocBtn" style="display:none; margin-left:12px;">
                <button onclick="openAddModal()">+ Agregar documento</button>
            </span>
            <div id="docsContent" style="margin-top:8px;"><span class="muted">Selecciona una colección</span></div>
            <div class="pagination" id="pagination" style="display:none;">
                <button onclick="prevPage()" id="btnPrev" disabled>← Anterior</button>
                <span id="pageInfo">Página 1</span>
                <button onclick="nextPage()" id="btnNext">Siguiente →</button>
            </div>
        </div>
    </div>

    <hr>

    <b>Realtime Database</b><br><br>
    <button onclick="loadRTDB('secret_comments')">secret_comments</button>
    <button onclick="loadRTDB('notifications')">notifications</button>
    <button onclick="loadRTDB('secret_votes')">secret_votes</button>
    <button onclick="loadRTDB('comment_votes')">comment_votes</button>
    <button onclick="loadRTDB('user_comments_history')">user_comments_history</button>

    <br><br>
    <label>Ruta RTDB manual: <input type="text" id="manualRTDB" placeholder="ruta/nodo..." /></label>
    <button onclick="loadManualRTDB()">Cargar</button>

    <div id="rtdbContent" style="margin-top:16px;"><span class="muted">Selecciona un nodo</span></div>

    <!-- MODAL EDITAR -->
    <div class="overlay" id="editOverlay">
        <div class="modal">
            <h3 id="editModalTitle">Editar documento</h3>
            <div id="editFields"></div>
            <div class="add-field-row">
                <input type="text" id="newFieldKey" placeholder="nuevo campo" />
                <input type="text" id="newFieldVal" placeholder="valor" />
                <button onclick="addFieldRow()">+ Campo</button>
            </div>
            <div class="modal-footer">
                <button onclick="saveEdit()">Guardar</button>
                <button onclick="closeEditModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- MODAL AGREGAR -->
    <div class="overlay" id="addOverlay">
        <div class="modal">
            <h3>Agregar documento en <span id="addModalCol"></span></h3>
            <label>ID del documento (dejar vacío = auto)</label>
            <input type="text" id="newDocId" placeholder="opcional..." />
            <label>Datos (JSON)</label>
            <textarea id="newDocData" style="height:160px;" placeholder='{"campo": "valor"}'></textarea>
            <div class="modal-footer">
                <button onclick="saveNewDoc()">Agregar</button>
                <button onclick="closeAddModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCdHZ7F0NKOmmFVg0QetWSbMbyeUFoOVt4",
            authDomain: "misecretofreesecretos.firebaseapp.com",
            projectId: "misecretofreesecretos",
            storageBucket: "misecretofreesecretos.appspot.com",
            messagingSenderId: "621380080944",
            appId: "1:621380080944:web:da1ec9ab68e0af12f664f5",
            databaseURL: "https://misecretofreesecretos-default-rtdb.europe-west1.firebasedatabase.app"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const rtdb = firebase.database();
        const auth = firebase.auth();

        const PAGE_SIZE = 20;
        const KNOWN = ['secrets', 'users', 'config'];
        let found = new Set();
        let currentCollection = null;
        let pageStack = [null];
        let currentPage = 0;
        let lastDocOnPage = null;
        let colKeys = [];
        let editingDocId = null;

        function showError(msg) { const e = document.getElementById('errorBox'); e.textContent = msg; e.style.display = 'block'; }
        function hideError() { document.getElementById('errorBox').style.display = 'none'; }

        auth.signInAnonymously().catch(e => showError('Auth error: ' + e.message));

        async function loadFirestore() {
            hideError();
            found.clear();
            for (const name of KNOWN) {
                try {
                    const snap = await db.collection(name).limit(1).get();
                    if (!snap.empty) found.add(name);
                } catch (e) { }
            }
            renderCollections();
        }

        async function addManual() {
            const input = document.getElementById('manualCol');
            const name = input.value.trim();
            if (!name) return;
            input.value = '';
            hideError();
            try {
                const snap = await db.collection(name).limit(1).get();
                found.add(name);
                renderCollections();
                if (snap.empty) showError('"' + name + '" vacía o no existe.');
                else loadDocs(name);
            } catch (e) { showError('Error: ' + e.message); }
        }

        function renderCollections() {
            const list = document.getElementById('colList');
            document.getElementById('colCount').textContent = found.size;
            if (found.size === 0) { list.innerHTML = '<li class="muted">ninguna</li>'; return; }
            list.innerHTML = '';
            found.forEach(name => {
                const li = document.createElement('li');
                li.innerHTML = '<a onclick="loadDocs(\'' + name + '\')">' + name + '</a>';
                list.appendChild(li);
            });
        }

        async function loadDocs(colName) {
            hideError();
            currentCollection = colName;
            pageStack = [null];
            currentPage = 0;
            colKeys = [];
            document.getElementById('docsTitle').textContent = 'Documentos — ' + colName;
            document.getElementById('addDocBtn').style.display = 'inline';
            document.getElementById('addModalCol').textContent = colName;
            await fetchPage(null);
        }

        async function fetchPage(startAfterDoc) {
            document.getElementById('docsContent').innerHTML = '<span class="muted">Cargando...</span>';
            document.getElementById('pagination').style.display = 'none';
            try {
                let q = db.collection(currentCollection).orderBy(firebase.firestore.FieldPath.documentId()).limit(PAGE_SIZE);
                if (startAfterDoc) q = q.startAfter(startAfterDoc);
                const snap = await q.get();
                const docs = [];
                snap.forEach(d => docs.push({ id: d.id, data: d.data(), ref: d }));

                if (docs.length === 0 && currentPage === 0) {
                    document.getElementById('docsContent').innerHTML = '<span class="muted">Vacía</span>';
                    return;
                }

                if (colKeys.length === 0 && docs.length > 0) {
                    colKeys = Array.from(new Set(docs.flatMap(d => Object.keys(d.data))));
                }

                lastDocOnPage = docs.length > 0 ? docs[docs.length - 1].ref : null;
                window.__cache = window.__cache || {};
                window.__cache[currentCollection] = docs;

                let html = '<table><thead><tr><th>ID</th>';
                colKeys.forEach(k => html += '<th>' + k + '</th>');
                html += '<th>Acciones</th></tr></thead><tbody>';

                docs.forEach(doc => {
                    html += '<tr><td>' + doc.id + '</td>';
                    colKeys.forEach(k => html += '<td>' + formatVal(doc.data[k]) + '</td>');
                    html += '<td style="white-space:nowrap;">'
                        + '<button class="btn-edit" onclick="openEditModal(\'' + doc.id + '\')">Editar</button> '
                        + '<button class="btn-danger" onclick="deleteDoc(\'' + doc.id + '\')">Eliminar</button>'
                        + '</td></tr>';
                });

                html += '</tbody></table>';
                html += '<p class="muted" style="margin-top:8px;">' + docs.length + ' documentos en esta página</p>';
                document.getElementById('docsContent').innerHTML = html;

                const pagination = document.getElementById('pagination');
                pagination.style.display = 'flex';
                document.getElementById('pageInfo').textContent = 'Página ' + (currentPage + 1);
                document.getElementById('btnPrev').disabled = currentPage === 0;
                document.getElementById('btnNext').disabled = docs.length < PAGE_SIZE;
            } catch (e) {
                document.getElementById('docsContent').innerHTML = '<span class="error">Error: ' + e.message + '</span>';
            }
        }

        async function nextPage() {
            if (!lastDocOnPage) return;
            pageStack.push(lastDocOnPage);
            currentPage++;
            await fetchPage(lastDocOnPage);
        }

        async function prevPage() {
            if (currentPage === 0) return;
            currentPage--;
            pageStack.pop();
            await fetchPage(pageStack[pageStack.length - 1]);
        }

        // --- EDITAR ---
        function openEditModal(docId) {
            const doc = window.__cache?.[currentCollection]?.find(d => d.id === docId);
            if (!doc) return;
            editingDocId = docId;
            document.getElementById('editModalTitle').textContent = 'Editar — ' + docId;
            const container = document.getElementById('editFields');
            container.innerHTML = '';
            Object.entries(doc.data).forEach(([k, v]) => {
                const val = typeof v === 'object' ? JSON.stringify(v) : String(v);
                container.innerHTML += '<label>' + k + '</label><textarea data-key="' + k + '">' + val + '</textarea>';
            });
            document.getElementById('newFieldKey').value = '';
            document.getElementById('newFieldVal').value = '';
            document.getElementById('editOverlay').classList.add('show');
        }

        function addFieldRow() {
            const k = document.getElementById('newFieldKey').value.trim();
            const v = document.getElementById('newFieldVal').value.trim();
            if (!k) return;
            const container = document.getElementById('editFields');
            container.innerHTML += '<label>' + k + '</label><textarea data-key="' + k + '">' + v + '</textarea>';
            document.getElementById('newFieldKey').value = '';
            document.getElementById('newFieldVal').value = '';
        }

        async function saveEdit() {
            if (!editingDocId || !currentCollection) return;
            const fields = document.querySelectorAll('#editFields textarea');
            const newData = {};
            fields.forEach(f => {
                const key = f.dataset.key;
                const val = f.value.trim();
                try { newData[key] = JSON.parse(val); }
                catch (e) { newData[key] = val; }
            });
            try {
                await db.collection(currentCollection).doc(editingDocId).set(newData);
                closeEditModal();
                await fetchPage(pageStack[pageStack.length - 1]);
            } catch (e) {
                alert('Error al guardar: ' + e.message);
            }
        }

        function closeEditModal() {
            document.getElementById('editOverlay').classList.remove('show');
            editingDocId = null;
        }

        // --- ELIMINAR ---
        async function deleteDoc(docId) {
            if (!confirm('¿Eliminar el documento "' + docId + '"? Esta acción no se puede deshacer.')) return;
            try {
                await db.collection(currentCollection).doc(docId).delete();
                await fetchPage(pageStack[pageStack.length - 1]);
            } catch (e) {
                alert('Error al eliminar: ' + e.message);
            }
        }

        // --- AGREGAR ---
        function openAddModal() {
            document.getElementById('newDocId').value = '';
            document.getElementById('newDocData').value = '';
            document.getElementById('addOverlay').classList.add('show');
        }

        function closeAddModal() {
            document.getElementById('addOverlay').classList.remove('show');
        }

        async function saveNewDoc() {
            const id = document.getElementById('newDocId').value.trim();
            const rawData = document.getElementById('newDocData').value.trim();
            let data;
            try { data = JSON.parse(rawData); }
            catch (e) { alert('El JSON no es válido.'); return; }
            try {
                if (id) await db.collection(currentCollection).doc(id).set(data);
                else await db.collection(currentCollection).add(data);
                closeAddModal();
                await fetchPage(pageStack[pageStack.length - 1]);
            } catch (e) {
                alert('Error al agregar: ' + e.message);
            }
        }

        // --- RTDB ---
        async function loadRTDB(path) {
            const content = document.getElementById('rtdbContent');
            content.innerHTML = '<span class="muted">Cargando ' + path + '...</span>';
            try {
                const snap = await rtdb.ref(path).limitToFirst(50).get();
                if (!snap.exists()) { content.innerHTML = '<span class="muted">Nodo vacío: ' + path + '</span>'; return; }
                const data = snap.val();
                window.__rtdbCache = data;
                content.innerHTML = '<b>' + path + '</b> (' + Object.keys(data).length + ' hijos)<br><br>' + renderRTDBTable(data);
            } catch (e) {
                content.innerHTML = '<span class="error">Error: ' + e.message + '</span>';
            }
        }

        async function loadManualRTDB() {
            const path = document.getElementById('manualRTDB').value.trim();
            if (!path) return;
            loadRTDB(path);
        }

        function renderRTDBTable(data) {
            const keys = Object.keys(data);
            if (keys.length === 0) return '<span class="muted">vacío</span>';
            let html = '<table><thead><tr><th>Key</th><th>Valor</th><th></th></tr></thead><tbody>';
            keys.forEach(k => {
                html += '<tr><td>' + k + '</td><td>' + formatVal(data[k]) + '</td>';
                html += '<td><button onclick="openRTDBJSON(\'' + encodeURIComponent(k) + '\')">JSON</button></td></tr>';
            });
            html += '</tbody></table>';
            return html;
        }

        function openRTDBJSON(encodedKey) {
            const key = decodeURIComponent(encodedKey);
            const val = window.__rtdbCache?.[key];
            if (val === undefined) return;
            const w = window.open('', '_blank', 'width=700,height=600');
            w.document.write('<pre style="font-family:monospace;padding:16px;font-size:13px;">' + JSON.stringify(val, null, 2) + '</pre>');
        }

        function formatVal(val) {
            if (val === null || val === undefined) return '<span class="muted">null</span>';
            if (typeof val === 'object') {
                const s = JSON.stringify(val);
                return s.length > 80 ? s.slice(0, 80) + '...' : s;
            }
            const s = String(val);
            return s.length > 100 ? s.slice(0, 100) + '...' : s;
        }
    </script>
</body>

</html>
